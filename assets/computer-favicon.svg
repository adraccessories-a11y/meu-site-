<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Monitor body -->
  <rect x="8" y="8" width="48" height="32" rx="2" fill="#00f2fe" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
  
  <!-- Screen -->
  <rect x="12" y="12" width="40" height="24" rx="1" fill="#040a1f" stroke="#00f2fe" stroke-width="0.5"/>
  
  <!-- Screen glare effect -->
  <rect x="14" y="14" width="36" height="4" fill="#00f2fe" opacity="0.2"/>
  
  <!-- Stand base -->
  <rect x="26" y="40" width="12" height="14" rx="1" fill="#00f2fe" stroke="#7c3aed" stroke-width="1" opacity="0.85"/>
  
  <!-- Stand support left -->
  <line x1="18" y1="40" x2="26" y2="54" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Stand support right -->
  <line x1="46" y1="40" x2="38" y2="54" stroke="#7c3aed" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Screen content (circuit lines) -->
  <line x1="16" y1="22" x2="48" y2="22" stroke="#00f2fe" stroke-width="0.5" opacity="0.3"/>
  <line x1="16" y1="28" x2="48" y2="28" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <line x1="16" y1="34" x2="48" y2="34" stroke="#00f2fe" stroke-width="0.5" opacity="0.3"/>
</svg>